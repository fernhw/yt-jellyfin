<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 32 32">
  <defs>
    <radialGradient id="core" cx="50%" cy="50%" r="50%">
      <stop offset="0%"  stop-color="#ffffff" stop-opacity="1"/>
      <stop offset="35%" stop-color="#818cf8" stop-opacity="0.85"/>
      <stop offset="100%" stop-color="#0f0020" stop-opacity="0"/>
    </radialGradient>
    <radialGradient id="bg" cx="40%" cy="40%" r="65%">
      <stop offset="0%"  stop-color="#160030"/>
      <stop offset="100%" stop-color="#04000e"/>
    </radialGradient>
    <filter id="glow">
      <feGaussianBlur stdDeviation="0.8" result="blur"/>
      <feMerge><feMergeNode in="blur"/><feMergeNode in="SourceGraphic"/></feMerge>
    </filter>
  </defs>
  <rect width="32" height="32" rx="7" fill="url(#bg)"/>
  <!-- tilted orbital rings at ~40deg -->
  <g transform="rotate(40 16 16)">
    <ellipse cx="16" cy="16" rx="13.5" ry="4.5" fill="none" stroke="#4f1fc7" stroke-width="1"   opacity="0.4"/>
    <ellipse cx="16" cy="16" rx="11"   ry="3.6" fill="none" stroke="#6d28d9" stroke-width="1.1" opacity="0.6"/>
    <ellipse cx="16" cy="16" rx="8.5"  ry="2.8" fill="none" stroke="#8b5cf6" stroke-width="1.2" opacity="0.75"/>
    <ellipse cx="16" cy="16" rx="6"    ry="2"   fill="none" stroke="#a78bfa" stroke-width="1.3" opacity="0.88"/>
    <ellipse cx="16" cy="16" rx="3.5"  ry="1.2" fill="none" stroke="#c4b5fd" stroke-width="1.3" opacity="0.95"/>
  </g>
  <!-- cross-ring at -40deg for depth -->
  <g transform="rotate(-50 16 16)">
    <ellipse cx="16" cy="16" rx="11"  ry="3.2" fill="none" stroke="#7c3aed" stroke-width="0.9" opacity="0.35"/>
    <ellipse cx="16" cy="16" rx="7.5" ry="2.2" fill="none" stroke="#a78bfa" stroke-width="1"   opacity="0.5"/>
  </g>
  <!-- glowing core -->
  <circle cx="16" cy="16" r="7" fill="url(#core)" filter="url(#glow)"/>
  <circle cx="16" cy="16" r="2" fill="#ffffff" opacity="1" filter="url(#glow)"/>
  <!-- hot spark -->
  <circle cx="16" cy="16" r="0.8" fill="#e0d4ff"/>
</svg>
